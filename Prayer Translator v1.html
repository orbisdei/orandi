    <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
  </svg>
);

// ═══════════════════════════════════════════════════════
// THEME DEFINITIONS
// ═══════════════════════════════════════════════════════
const THEMES = {
  sepia: {
    bg: '#F5ECD7', appBg: '#F0E4C8', headerBg: '#5C1A2E', headerText: '#F5ECD7',
    divider: '#C8A96E', text: '#2C1810', textMuted: '#7A5C44', accent: '#B8943F',
    leftColBg: '#F5ECD7', rightColBg: '#EDE0C4', rowHover: 'rgba(184,148,63,0.08)',
    rowBorder: 'rgba(184,148,63,0.25)', langBarBg: '#E8D5B0', navBg: '#5C1A2E',
    navText: '#F5ECD7', shadow: 'rgba(92,26,46,0.15)',
    statusDark: true,
  },
  dark: {
    bg: '#0D0D14', appBg: '#12121C', headerBg: '#1A1428', headerText: '#E8D9C0',
    divider: '#8B6F47', text: '#E8D9C0', textMuted: '#9080A0',
    accent: '#C9A84C',
    leftColBg: '#12121C', rightColBg: '#0F0F18', rowHover: 'rgba(201,168,76,0.07)',
    rowBorder: 'rgba(201,168,76,0.15)', langBarBg: '#1A1428', navBg: '#1A1428',
    navText: '#E8D9C0', shadow: 'rgba(0,0,0,0.5)',
    statusDark: false,
  },
  light: {
    bg: '#F8F5F0', appBg: '#FFFFFF', headerBg: '#FFFFFF', headerText: '#2C1810',
    divider: '#D4B896', text: '#1A1008', textMuted: '#8B7355',
    accent: '#8B4513',
    leftColBg: '#FFFFFF', rightColBg: '#FAF7F2', rowHover: 'rgba(139,69,19,0.04)',
    rowBorder: 'rgba(212,184,150,0.5)', langBarBg: '#F5F0E8', navBg: '#F5F0E8',
    navText: '#2C1810', shadow: 'rgba(44,24,16,0.1)',
    statusDark: true,
  }
};

// ═══════════════════════════════════════════════════════
// LANGUAGE SELECTOR MODAL
// ═══════════════════════════════════════════════════════
function LangModal({ side, currentLang, otherLang, onSelect, onClose, theme }) {
  const t = THEMES[theme];
  const langs = Object.keys(LANG_NAMES);
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100, display: 'flex', alignItems: 'flex-end',
      background: 'rgba(0,0,0,0.5)',
    }} onClick={onClose}>
      <div style={{
        width: '100%', background: t.appBg, borderRadius: '16px 16px 0 0',
        padding: '8px 0 24px', boxShadow: `0 -4px 24px ${t.shadow}`,
      }} onClick={e => e.stopPropagation()}>
        <div style={{ width: 36, height: 4, background: t.divider, borderRadius: 2, margin: '8px auto 16px', opacity: 0.5 }}></div>
        <div style={{ fontFamily: 'Cinzel, serif', fontSize: 11, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 2, padding: '0 20px 12px', textAlign: 'center' }}>
          Select {side === 'left' ? 'Left' : 'Right'} Language
        </div>
        {langs.map(lang => (
          <button key={lang} onClick={() => onSelect(lang)} style={{
            display: 'flex', alignItems: 'center', width: '100%', padding: '13px 24px',
            background: lang === currentLang ? `${t.accent}22` : 'transparent',
            border: 'none', cursor: 'pointer', gap: 12,
          }}>
            <span style={{ fontFamily: 'Cinzel, serif', fontSize: 15, color: t.text, fontWeight: lang === currentLang ? 600 : 400 }}>
              {LANG_NAMES[lang]}
            </span>
            {lang === currentLang && <span style={{ marginLeft: 'auto', color: t.accent, fontSize: 18 }}>✓</span>}
            {lang === otherLang && <span style={{ marginLeft: 'auto', fontFamily: 'Cinzel', fontSize: 10, color: t.textMuted }}>other side</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// PRAYER SELECTOR MODAL
// ═══════════════════════════════════════════════════════
function PrayerModal({ currentId, onSelect, onClose, theme, lang }) {
  const t = THEMES[theme];
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 100, display: 'flex', alignItems: 'flex-end',
      background: 'rgba(0,0,0,0.5)',
    }} onClick={onClose}>
      <div style={{
        width: '100%', background: t.appBg, borderRadius: '16px 16px 0 0',
        padding: '8px 0 32px', boxShadow: `0 -4px 24px ${t.shadow}`,
      }} onClick={e => e.stopPropagation()}>
        <div style={{ width: 36, height: 4, background: t.divider, borderRadius: 2, margin: '8px auto 16px', opacity: 0.5 }}></div>
        <div style={{ fontFamily: 'Cinzel, serif', fontSize: 11, color: t.textMuted, textTransform: 'uppercase', letterSpacing: 2, padding: '0 20px 12px', textAlign: 'center' }}>
          Select Prayer
        </div>
        {PRAYERS.map(p => (
          <button key={p.id} onClick={() => onSelect(p.id)} style={{
            display: 'flex', flexDirection: 'column', width: '100%', padding: '13px 24px',
            background: p.id === currentId ? `${t.accent}22` : 'transparent',
            border: 'none', cursor: 'pointer', textAlign: 'left', gap: 2,
            borderBottom: `1px solid ${t.rowBorder}`,
          }}>
            <span style={{ fontFamily: 'Cinzel, serif', fontSize: 15, color: t.text, fontWeight: p.id === currentId ? 600 : 400 }}>
              {p.title[lang] || p.title.en}
            </span>
            <span style={{ fontFamily: 'EB Garamond, serif', fontSize: 12, color: t.textMuted }}>
              {p.verses.length} verses
            </span>
          </button>
        ))}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════
function PrayerApp({ tweaks, containerWidth, containerHeight }) {
  const { theme, splitDir, fontSize, leftLang, rightLang, showVerseNumbers, highlightActive } = tweaks;
  const t = THEMES[theme] || THEMES.sepia;

  const [prayerId, setPrayerId] = React.useState('ourFather');
  const [showPrayerModal, setShowPrayerModal] = React.useState(false);
  const [showLangModal, setShowLangModal] = React.useState(null); // 'left' | 'right' | null
  const [activeTab, setActiveTab] = React.useState('prayer');
  const [hoveredVerse, setHoveredVerse] = React.useState(null);

  const prayer = PRAYERS.find(p => p.id === prayerId) || PRAYERS[0];

  const isVertical = splitDir === 'vertical';

  const appStyle = {
    width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
    background: t.appBg, fontFamily: 'EB Garamond, serif', overflow: 'hidden',
    position: 'relative',
  };

  // ── Header ──
  const headerStyle = {
    background: t.headerBg, color: t.headerText,
    padding: '10px 16px 10px',
    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    flexShrink: 0,
    borderBottom: `1px solid ${t.divider}33`,
  };

  // ── Language bar ──
  const langBarStyle = {
    display: 'flex', alignItems: 'center', background: t.langBarBg,
    borderBottom: `1px solid ${t.rowBorder}`,
    flexShrink: 0, height: 40,
  };

  // ── Verse rows ──
  const scrollStyle = {
    flex: 1, overflowY: 'auto', overflowX: 'hidden',
    WebkitOverflowScrolling: 'touch',
  };

  const verseRowStyle = (i) => ({
    display: 'flex',
    flexDirection: isVertical ? 'row' : 'column',
    borderBottom: `1px solid ${t.rowBorder}`,
    background: hoveredVerse === i ? t.rowHover : 'transparent',
    transition: 'background 0.15s',
    cursor: 'default',
  });

  const colStyle = (side) => ({
    flex: 1,
    padding: isVertical ? '12px 12px' : '10px 16px',
    fontSize: fontSize,
    lineHeight: 1.6,
    color: t.text,
    fontFamily: 'EB Garamond, serif',
    background: side === 'left' ? t.leftColBg : t.rightColBg,
    borderRight: isVertical && side === 'left' ? `2px solid ${t.divider}` : 'none',
    borderBottom: !isVertical && side === 'left' ? `1px dashed ${t.rowBorder}` : 'none',
    minWidth: 0,
    wordBreak: 'break-word',
    hyphens: 'auto',
  });

  // Bottom nav
  const navItems = [
    { id: 'prayer', icon: <CrossIcon />, label: 'Prayers' },
    { id: 'languages', icon: <GlobeIcon />, label: 'Languages' },
    { id: 'settings', icon: <SettingsIcon />, label: 'Settings' },
  ];

  return (
    <div style={appStyle}>
      {/* Header */}
      <div style={headerStyle}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ color: t.accent, opacity: 0.9 }}><CrossIcon /></span>
          <span style={{ fontFamily: 'Cinzel, serif', fontSize: 13, letterSpacing: 3, fontWeight: 600, textTransform: 'uppercase' }}>Oratio</span>
        </div>

        <button onClick={() => setShowPrayerModal(true)} style={{
          display: 'flex', alignItems: 'center', gap: 6,
          background: 'rgba(255,255,255,0.12)', border: `1px solid rgba(255,255,255,0.2)`,
          borderRadius: 20, padding: '5px 12px 5px 14px', cursor: 'pointer',
          color: t.headerText, fontFamily: 'Cinzel, serif', fontSize: 12, letterSpacing: 0.5,
        }}>
          {(prayer.title[leftLang] || prayer.title.en)}
          <ChevronDown />
        </button>

        <div style={{ display: 'flex', gap: 2 }}>
          {['sepia','dark','light'].map(th => (
            <button key={th} onClick={() => tweaks._set({ theme: th })} title={th} style={{
              width: 22, height: 22, borderRadius: '50%', border: `2px solid ${theme === th ? t.accent : 'transparent'}`,
              background: th === 'sepia' ? '#B8943F' : th === 'dark' ? '#1a1428' : '#f8f5f0',
              cursor: 'pointer', padding: 0,
            }} />
          ))}
        </div>
      </div>

      {/* Language bar */}
      <div style={langBarStyle}>
        <button onClick={() => setShowLangModal('left')} style={{
          flex: 1, height: '100%', background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4,
          fontFamily: 'Cinzel, serif', fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
          color: t.accent, fontWeight: 600,
        }}>
          {LANG_NAMES[leftLang]} <ChevronDown />
        </button>

        <button onClick={() => {
          tweaks._set({ leftLang: rightLang, rightLang: leftLang });
        }} style={{
          width: 36, height: 36, borderRadius: '50%', border: `1px solid ${t.divider}`,
          background: t.appBg, cursor: 'pointer', display: 'flex', alignItems: 'center',
          justifyContent: 'center', color: t.textMuted, flexShrink: 0,
        }}>
          <SwapIcon />
        </button>

        <button onClick={() => setShowLangModal('right')} style={{
          flex: 1, height: '100%', background: 'none', border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4,
          fontFamily: 'Cinzel, serif', fontSize: 11, letterSpacing: 1.5, textTransform: 'uppercase',
          color: t.textMuted, fontWeight: 600,
        }}>
          {LANG_NAMES[rightLang]} <ChevronDown />
        </button>
      </div>

      {/* Prayer title row */}
      <div style={{
        display: 'flex', flexDirection: isVertical ? 'row' : 'column',
        background: t.langBarBg, borderBottom: `2px solid ${t.divider}44`, flexShrink: 0,
      }}>
        <div style={{
          flex: 1, padding: '10px 12px', fontFamily: 'Cinzel, serif', fontSize: 13,
          fontWeight: 600, color: t.accent, letterSpacing: 0.5,
          borderRight: isVertical ? `2px solid ${t.divider}` : 'none',
          borderBottom: !isVertical ? `1px solid ${t.rowBorder}` : 'none',
          textAlign: 'center',
        }}>
          {prayer.title[leftLang] || prayer.title.en}
        </div>
        <div style={{
          flex: 1, padding: '10px 12px', fontFamily: 'Cinzel, serif', fontSize: 13,
          fontWeight: 600, color: t.textMuted, letterSpacing: 0.5, textAlign: 'center',
        }}>
          {prayer.title[rightLang] || prayer.title.en}
        </div>
      </div>

      {/* Synchronized verse scroll */}
      <div style={scrollStyle}>
        {prayer.verses.map((verse, i) => (
          <div key={i}
            style={verseRowStyle(i)}
            onMouseEnter={() => highlightActive && setHoveredVerse(i)}
            onMouseLeave={() => setHoveredVerse(null)}
          >
            {showVerseNumbers && (
              <div style={{ width: 24, flexShrink: 0, paddingTop: 14, fontFamily: 'Cinzel', fontSize: 9, color: t.textMuted, textAlign: 'center', letterSpacing: 0.5 }}>
                {i + 1}
              </div>
            )}
            <div style={colStyle('left')}>
              {verse[leftLang] || verse.en}
            </div>
            <div style={colStyle('right')}>
              {verse[rightLang] || verse.la}
            </div>
          </div>
        ))}
        {/* End ornament */}
        <div style={{ padding: '24px 0', textAlign: 'center', color: t.divider, fontSize: 22, userSelect: 'none' }}>
          ✦
        </div>
      </div>

      {/* Bottom nav */}
      <div style={{
        display: 'flex', background: t.navBg, borderTop: `1px solid ${t.divider}33`,
        flexShrink: 0, paddingBottom: 4,
      }}>
        {navItems.map(item => (
          <button key={item.id} onClick={() => {
            setActiveTab(item.id);
            if (item.id === 'languages') setShowLangModal('left');
          }} style={{
            flex: 1, padding: '8px 0 6px', background: 'none', border: 'none',
            cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2,
            color: activeTab === item.id ? t.accent : `${t.navText}88`,
            transition: 'color 0.15s',
          }}>
            {item.icon}
            <span style={{ fontFamily: 'Cinzel, serif', fontSize: 9, letterSpacing: 0.8, textTransform: 'uppercase' }}>
              {item.label}
            </span>
          </button>
        ))}
      </div>

      {/* Modals */}
      {showPrayerModal && (
        <PrayerModal
          currentId={prayerId}
          onSelect={id => { setPrayerId(id); setShowPrayerModal(false); }}
          onClose={() => setShowPrayerModal(false)}
          theme={theme} lang={leftLang}
        />
      )}
      {showLangModal && (
        <LangModal
          side={showLangModal}
          currentLang={showLangModal === 'left' ? leftLang : rightLang}
          otherLang={showLangModal === 'left' ? rightLang : leftLang}
          onSelect={lang => {
            tweaks._set(showLangModal === 'left' ? { leftLang: lang } : { rightLang: lang });
            setShowLangModal(null);
          }}
          onClose={() => setShowLangModal(null)}
          theme={theme}
        />
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════
// ROOT — iOS Frame + Tweaks
// ═══════════════════════════════════════════════════════
function Root() {
  const [tweakState, setTweakState] = React.useState(TWEAK_DEFAULTS);

  const tweaks = {
    ...tweakState,
    _set: (updates) => setTweakState(prev => ({ ...prev, ...updates })),
  };

  const isDark = tweakState.theme === 'dark';

  return (
    <>
      <IOSDevice dark={isDark} style={{ maxHeight: '95vh' }}>
        <IOSStatusBar dark={isDark} />
        <PrayerApp tweaks={tweaks} />
      </IOSDevice>

      <TweaksPanel defaults={TWEAK_DEFAULTS} onUpdate={(key, val) => tweaks._set({ [key]: val })}>
        <TweakSection title="Display">
          <TweakSelect id="theme" label="Theme" options={[
            { value: 'sepia', label: 'Sepia (Parchment)' },
            { value: 'dark', label: 'Dark (Night)' },
            { value: 'light', label: 'Light (Day)' },
          ]} />
          <TweakRadio id="splitDir" label="Split direction" options={[
            { value: 'vertical', label: '⬛⬛ Side by side' },
            { value: 'horizontal', label: '🔲 Top & Bottom' },
          ]} />
          <TweakSlider id="fontSize" label="Text size" min={13} max={24} step={1} />
        </TweakSection>
        <TweakSection title="Languages">
          <TweakSelect id="leftLang" label="Left / Top language" options={Object.entries(LANG_NAMES).map(([v,l])=>({value:v,label:l}))} />
          <TweakSelect id="rightLang" label="Right / Bottom language" options={Object.entries(LANG_NAMES).map(([v,l])=>({value:v,label:l}))} />
        </TweakSection>
        <TweakSection title="Reading aids">
          <TweakToggle id="showVerseNumbers" label="Verse numbers" />
          <TweakToggle id="highlightActive" label="Highlight on hover" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
