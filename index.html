<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Orandi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="prayer-data.js"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="prayer-app-core.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  #root { width: 100%; height: 100%; }
</style>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5C1A2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Orandi">
<link rel="apple-touch-icon" href="/icons/icon-192.png">

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW failed:', err));
    });
  }
</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "sepia",
  "fontSize": 17,
  "leftLang": "en",
  "rightLang": "la",
  "showVerseNumbers": false,
  "highlightActive": true
}/*EDITMODE-END*/;

function Root() {
  const [isLandscape, setIsLandscape] = React.useState(
    () => Math.abs(window.screen?.orientation?.angle ?? (window.orientation || 0)) === 90
  );
  const [tweakState, setTweakState] = React.useState(TWEAK_DEFAULTS);
  const tweaks = { ...tweakState, _set: u => setTweakState(p => ({...p,...u})) };

  React.useEffect(() => {
    const handler = () => {
      const angle = window.screen?.orientation?.angle ?? (window.orientation || 0);
      setIsLandscape(Math.abs(angle) === 90);
    };
    window.addEventListener('orientationchange', handler);
    window.screen?.orientation?.addEventListener('change', handler);
    return () => {
      window.removeEventListener('orientationchange', handler);
      window.screen?.orientation?.removeEventListener('change', handler);
    };
  }, []);

  return (
    <>
      <PrayerApp
        isLandscape={isLandscape}
        width="100%"
        height="100%"
        onToggleOrientation={() => setIsLandscape(l => !l)}
        tweaks={tweaks}
      />
      <TweaksPanel defaults={TWEAK_DEFAULTS} onUpdate={(k,v) => tweaks._set({[k]:v})}>
        <TweakSection title="Display">
          <TweakSelect id="theme" label="Theme" options={[{value:'sepia',label:'Sepia'},{value:'dark',label:'Dark'},{value:'light',label:'Light'}]} />
          <TweakSlider id="fontSize" label="Text size" min={13} max={24} step={1} />
        </TweakSection>
        <TweakSection title="Languages">
          <TweakSelect id="leftLang" label="Primary" options={Object.entries(window.LANG_NAMES).map(([v,l])=>({value:v,label:l}))} />
          <TweakSelect id="rightLang" label="Translation" options={Object.entries(window.LANG_NAMES).map(([v,l])=>({value:v,label:l}))} />
        </TweakSection>
        <TweakSection title="Reading">
          <TweakToggle id="showVerseNumbers" label="Verse numbers" />
          <TweakToggle id="highlightActive" label="Highlight on touch" />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>
</body>
</html>
